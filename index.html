<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Prestaciones Laborales</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator-container">
        <h1 class="main-title">Simulador de Nómina y Prestaciones</h1>

        <form id="datosGenerales" class="calc-form">
            
            <!--Información Básica -->
            <fieldset class="form-section">
                <legend class="section-title">Información Básica</legend>

                <label for="nombreCompleto" class="form-label">Nombre Completo:</label>
                <input type="text" id="nombreCompleto" class="form-input" required>

                <label for="edad" class="form-label">Edad (en años):</label>
                <input type="number" id="edad" class="form-input" min="1" required>

                <label for="tipoDocumento" class="form-label">Tipo de Documento:</label>
                <select id="tipoDocumento" class="form-input" required>
                    <option value="">Seleccione una opción...</option>
                    <option value="RC">RC</option> 
                    <option value="TI">TI</option> 
                    <option value="CC">CC</option>
                    <option value="CE">CE</option> 
                    <option value="PP">PP</option> 
                </select> 

                <label for="numeroDocumento" class="form-label">Número de documento (sin puntos ni comas):</label>
                <input type="number" id="numeroDocumento" class="form-input" required> 

            </fieldset>

            <!-- Información Salarial -->
            <fieldset class="form-section">
                <legend class="section-title">Información Salarial</legend>

                <label for="salario" class="form-label">Salario (en COP, sin puntos ni comas):</label>
                <input type="number" id="salario" class="form-input" min="0" required> 

                <label for="comisiones" class="form-label">Comisiones (en COP):</label>
                <input type="number" id="comisiones" class="form-input" min="0" value="0" required> 

                <label for="horasExtras" class="form-label">Total de horas extra (en COP):</label>
                <input type="number" id="horasExtras" class="form-input" min="0" value="0" required> 

                <label for="nivelRiesgo" class="form-label">Clasificación Nivel de Riesgo ARL:</label>
                <select id="nivelRiesgo" class="form-input" required> 
                    <option value="1">Riesgo I (Mínimo)</option>
                    <option value="2">Riesgo II (Bajo)</option>
                    <option value="3">Riesgo III (Medio)</option>
                    <option value="4">Riesgo IV (Alto)</option>
                    <option value="5">Riesgo V (Máximo)</option>
                </select>

            </fieldset>

            <button type="submit" id="btnCalcular" class="btn-primary">Calcular Nómina</button>

        </form>

        <!-- Aquí se mostrarán los resultados más adelante -->
        <div id="resultados" class="results-container"></div>
    </div>

    <!-- Llamado al archivo JavaScript -->
    <script src="script.js"></script>

</body>
</html>
